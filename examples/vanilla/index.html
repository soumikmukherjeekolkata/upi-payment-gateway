<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPI Intents — Vanilla JS Integration Demo</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0b0f19;
      --surface: #151d30;
      --border: #222f4c;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Outfit', sans-serif;
      --font-mono: 'Fira Code', monospace;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    header {
      margin-bottom: 32px;
      text-align: center;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: rgba(11, 15, 25, 0.6);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--font-sans);
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    button {
      flex: 1;
      min-width: 140px;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    button.secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--text-muted);
    }

    .results-section {
      margin-top: 8px;
    }

    .uri-display {
      background: rgba(11, 15, 25, 0.8);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 13px;
      word-break: break-all;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .meta-info {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .app-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }

    .app-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .app-btn:hover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
      transform: translateY(-1px);
    }

    .app-btn img {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      object-fit: contain;
    }

    .qr-section {
      text-align: center;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.01);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .qr-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-muted);
    }

    .qr-box {
      background: white;
      padding: 12px;
      border-radius: var(--radius);
      display: inline-block;
    }

    .qr-box svg, .qr-box img {
      display: block;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-top: 16px;
    }

    .footer {
      margin-top: auto;
      padding: 24px 0 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      width: 100%;
    }

    @media (max-width: 600px) {
      .btn-group {
        flex-direction: column;
      }
      button {
        width: 100%;
      }
      .app-list {
        grid-template-columns: 1fr;
      }
      .app-btn {
        justify-content: center;
        min-height: 44px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Vanilla JS Integration</h1>
    <p class="subtitle font-sans">Developed by Soumik Mukherjee &bull; Standalone Developer sandbox</p>
  </header>

  <div class="card">
    <div class="form-group">
      <label for="pa">Payee VPA</label>
      <input type="text" id="pa" value="soumikmukherjee4402@oksbi" placeholder="merchant@upi">
    </div>
    <div class="form-group">
      <label for="pn">Payee Name</label>
      <input type="text" id="pn" value="Soumik Mukherjee">
    </div>
    <div class="form-group">
      <label for="am">Amount (INR)</label>
      <input type="number" id="am" value="99.50" placeholder="100.00">
    </div>
    <div class="form-group">
      <label for="tn">Transaction Note</label>
      <input type="text" id="tn" value="Vanilla Demo Payment">
    </div>

    <div class="btn-group">
      <button onclick="generate('pay')">Generate Payment</button>
      <button onclick="generate('mandate')">Generate Mandate</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div id="results" class="results-section"></div>
</div>

<footer class="footer">
  &copy; 2026 Soumik Mukherjee. Powered by upi-intents.
</footer>

<script type="module">
import {
  createPaymentUri,
  createMandateUri,
  buildAppLink,
  detectPlatform,
  generateQRCode,
  generateQRCanvas,
} from '../../dist/index.js';

const APPS_TO_SHOW = ['gpay', 'phonepe', 'paytm', 'bhim', 'amazonpay', 'cred', 'whatsapp', 'generic'];
const APP_DOMAINS = {
  gpay: 'pay.google.com', phonepe: 'phonepe.com', paytm: 'paytm.com',
  bhim: 'bhimupi.org.in', amazonpay: 'amazon.in', cred: 'cred.club',
  whatsapp: 'whatsapp.com', generic: 'npci.org.in',
};

window.generate = function(action) {
  const pa = document.getElementById('pa').value.trim();
  const pn = document.getElementById('pn').value.trim();
  const am = document.getElementById('am').value.trim();
  const tn = document.getElementById('tn').value.trim();
  const results = document.getElementById('results');

  if (!pa || !pn) {
    results.innerHTML = '<div class="error-msg">Payee VPA and Name are required.</div>';
    return;
  }

  let uri;
  try {
    uri = action === 'pay'
      ? createPaymentUri(pa, pn, am, tn)
      : createMandateUri(pa, pn, am, tn, 'MANDATE-' + Date.now());
  } catch (e) {
    results.innerHTML = `<div class="error-msg">${e.message}</div>`;
    return;
  }

  const platform = detectPlatform();
  let html = `<div class="uri-display">${uri}</div>`;
  html += `<div class="meta-info">
    <span>PLATFORM: <strong>${platform.toUpperCase()}</strong></span>
    <span>ACTION: <strong>${action.toUpperCase()}</strong></span>
  </div>`;
  html += '<div class="app-list">';

  for (const appId of APPS_TO_SHOW) {
    const link = buildAppLink({ appId, upiUri: uri, platform });
    const domain = APP_DOMAINS[appId] || '';
    const favicon = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : '';
    html += `<a class="app-btn" href="${escapeAttr(link.url)}" target="_blank" rel="noopener">
      ${favicon ? `<img src="${favicon}" alt="" width="20" height="20" onerror="this.remove()">` : ''}
      <span>${link.app.label}</span>
    </a>`;
  }
  html += '</div>';

  // QR Code
  html += `<div class="qr-section">
    <div class="qr-title">QR Code Desktop Fallback</div>
    <div class="qr-box" id="qr"></div>
  </div>`;
  results.innerHTML = html;

  // Render QR
  const qrDiv = document.getElementById('qr');
  try {
    const qr = generateQRCode(uri, { size: 150 });
    if (qr.svg && qr.svg.length > 0) {
      qrDiv.innerHTML = qr.svg;
    } else {
      const canvas = generateQRCanvas(uri, { size: 150 });
      if (canvas) {
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        img.width = 150; img.height = 150;
        qrDiv.appendChild(img);
      }
    }
  } catch (e) {
    qrDiv.textContent = 'QR unavailable';
  }
};

window.clearAll = function() {
  document.getElementById('results').innerHTML = '';
};

function escapeAttr(s) { return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// Auto-generate on load
window.generate('pay');
</script>
</body>
</html>
